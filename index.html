<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Server Monitor</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Chart.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>

  <!-- JS -->
  <script src="script.js" defer></script>
</head><script>
// ── Clock ──
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toTimeString().slice(0,8);
}
updateClock();
setInterval(updateClock, 1000);

// ── Server data ──
const servers = [
  { name:'web-server-01',   cpu:42, mem:58, disk:34, net:1.2,  cpuSub:'4 cores · 3.2 GHz', memSub:'3.7 GB / 8 GB used',   diskSub:'68 GB / 200 GB used',   netSub:'↑ 0.8 MB/s · ↓ 0.4 MB/s' },
  { name:'db-server-01',    cpu:71, mem:78, disk:55, net:3.4,  cpuSub:'8 cores · 2.8 GHz', memSub:'6.2 GB / 8 GB used',   diskSub:'110 GB / 200 GB used',  netSub:'↑ 2.1 MB/s · ↓ 1.3 MB/s' },
  { name:'app-server-01',   cpu:35, mem:45, disk:28, net:0.9,  cpuSub:'4 cores · 3.6 GHz', memSub:'3.6 GB / 8 GB used',   diskSub:'56 GB / 200 GB used',   netSub:'↑ 0.5 MB/s · ↓ 0.4 MB/s' },
  { name:'cache-server-01', cpu:91, mem:62, disk:18, net:8.2,  cpuSub:'4 cores · 3.0 GHz', memSub:'4.96 GB / 8 GB used',  diskSub:'36 GB / 200 GB used',   netSub:'↑ 5.1 MB/s · ↓ 3.1 MB/s' },
];
let activeServer = 0;

function getStatus(val) {
  if (val >= 85) return 'crit';
  if (val >= 70) return 'warn';
  return 'ok';
}

function updateCards(s) {
  const metrics = [
    { id:'cpu',  val:s.cpu,  unit:'%',     sub:s.cpuSub  },
    { id:'mem',  val:s.mem,  unit:'%',     sub:s.memSub  },
    { id:'disk', val:s.disk, unit:'%',     sub:s.diskSub },
    { id:'net',  val:s.net,  unit:' MB/s', sub:s.netSub  },
  ];
  metrics.forEach(m => {
    const st = (m.id === 'net') ? 'ok' : getStatus(m.val);
    const card = document.getElementById(m.id+'-card');
    card.className = 'metric-card ' + st;
    const vEl = document.getElementById(m.id+'-val');
    vEl.className = 'metric-value ' + st;
    vEl.innerHTML = m.val + (m.id === 'net'
      ? '<span style="font-size:1rem"> MB/s</span>'
      : '<span style="font-size:1rem">%</span>');
    document.getElementById(m.id+'-sub').textContent = m.sub;
    if (m.id !== 'net') {
      document.getElementById(m.id+'-bar').style.width = m.val + '%';
    } else {
      document.getElementById(m.id+'-bar').style.width = Math.min(m.val / 10 * 100, 100) + '%';
    }
  });
  updateDonut(s);
}

function selectServer(el, idx) {
  document.querySelectorAll('.server-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  activeServer = idx;
  updateCards(servers[idx]);
  resetHistory(idx);
}

// ── Line chart history ──
const MAX_POINTS = 12;
const histories = servers.map(s => ({
  cpu:  Array.from({length:MAX_POINTS}, () => s.cpu  + (Math.random()-0.5)*10),
  mem:  Array.from({length:MAX_POINTS}, () => s.mem  + (Math.random()-0.5)*8),
  disk: Array.from({length:MAX_POINTS}, () => s.disk + (Math.random()-0.5)*4),
}));

const labels = Array.from({length:MAX_POINTS}, (_,i) => `-${(MAX_POINTS-1-i)*5}s`);

const lineCtx = document.getElementById('lineChart').getContext('2d');
const lineChart = new Chart(lineCtx, {
  type: 'line',
  data: {
    labels,
    datasets: [
      {
        label: 'CPU',
        data: histories[0].cpu,
        borderColor: '#00d4ff',
        backgroundColor: 'rgba(0,212,255,0.06)',
        borderWidth: 1.5,
        pointRadius: 0,
        tension: 0.4,
        fill: true,
      },
      {
        label: 'Memory',
        data: histories[0].mem,
        borderColor: '#a78bfa',
        backgroundColor: 'rgba(167,139,250,0.04)',
        borderWidth: 1.5,
        pointRadius: 0,
        tension: 0.4,
        fill: true,
      },
      {
        label: 'Disk',
        data: histories[0].disk,
        borderColor: '#00e5a0',
        backgroundColor: 'rgba(0,229,160,0.04)',
        borderWidth: 1.5,
        pointRadius: 0,
        tension: 0.4,
        fill: true,
      },
    ]
  },
  options: {
    responsive: true,
    animation: { duration: 400 },
    plugins: { legend: { display: false }, tooltip: {
      backgroundColor: '#0d1120',
      borderColor: 'rgba(255,255,255,0.1)',
      borderWidth: 1,
      titleColor: '#94a3b8',
      bodyColor: '#e2e8f0',
      titleFont: { family: 'JetBrains Mono', size: 11 },
      bodyFont:  { family: 'JetBrains Mono', size: 12 },
    }},
    scales: {
      x: { grid: { color:'rgba(255,255,255,0.04)' }, ticks: { color:'#475569', font:{ family:'JetBrains Mono', size:10 } } },
      y: { min:0, max:100, grid:{ color:'rgba(255,255,255,0.04)' }, ticks:{ color:'#475569', font:{ family:'JetBrains Mono', size:10 }, callback: v => v+'%' } }
    }
  }
});

function resetHistory(idx) {
  lineChart.data.datasets[0].data = [...histories[idx].cpu];
  lineChart.data.datasets[1].data = [...histories[idx].mem];
  lineChart.data.datasets[2].data = [...histories[idx].disk];
  lineChart.update();
}

// ── Donut chart ──
const donutCtx = document.getElementById('donutChart').getContext('2d');
const donutChart = new Chart(donutCtx, {
  type: 'doughnut',
  data: {
    labels: ['CPU', 'Memory', 'Disk', 'Free'],
    datasets: [{
      data: [42, 58, 34, 100-42],
      backgroundColor: ['#00d4ff','#a78bfa','#00e5a0','rgba(255,255,255,0.05)'],
      borderColor: '#0d1120',
      borderWidth: 3,
      hoverOffset: 4,
    }]
  },
  options: {
    responsive: true,
    cutout: '70%',
    plugins: {
      legend: {
        position: 'bottom',
        labels: { color:'#64748b', font:{ family:'JetBrains Mono', size:10 }, padding:12, boxWidth:10 }
      },
      tooltip: {
        backgroundColor: '#0d1120',
        borderColor: 'rgba(255,255,255,0.1)',
        borderWidth: 1,
        titleColor: '#94a3b8',
        bodyColor: '#e2e8f0',
        titleFont: { family:'JetBrains Mono', size:11 },
        bodyFont:  { family:'JetBrains Mono', size:12 },
      }
    }
  }
});

function updateDonut(s) {
  donutChart.data.datasets[0].data = [s.cpu, s.mem, s.disk, Math.max(0, 100 - s.cpu)];
  donutChart.update();
}

// ── Live simulation ──
function tick() {
  const s = servers[activeServer];
  const h = histories[activeServer];

  // Nudge values
  s.cpu  = Math.max(5,  Math.min(98, s.cpu  + (Math.random()-0.48)*4));
  s.mem  = Math.max(10, Math.min(95, s.mem  + (Math.random()-0.5)*2));
  s.disk = Math.max(5,  Math.min(90, s.disk + (Math.random()-0.5)*0.5));
  s.net  = Math.max(0.1,Math.min(15, s.net  + (Math.random()-0.5)*0.4));
  s.net  = Math.round(s.net * 10) / 10;

  // Push history
  h.cpu.push(Math.round(s.cpu));   if (h.cpu.length  > MAX_POINTS) h.cpu.shift();
  h.mem.push(Math.round(s.mem));   if (h.mem.length  > MAX_POINTS) h.mem.shift();
  h.disk.push(Math.round(s.disk)); if (h.disk.length > MAX_POINTS) h.disk.shift();

  updateCards(s);
  lineChart.data.datasets[0].data = [...h.cpu];
  lineChart.data.datasets[1].data = [...h.mem];
  lineChart.data.datasets[2].data = [...h.disk];
  lineChart.update('none');

  document.getElementById('last-sync').textContent = 'just now';
}

function refreshMetrics() { tick(); }
setInterval(tick, 5000);
updateCards(servers[0]);
</script>

document.addEventListener("DOMContentLoaded", function () {
  // ALL your code goes here
});

const el = document.getElementById('cpu-card');
if (el) {
  el.className = 'metric-card ' + st;
}

<body>

<header>
  <h1>Server Monitoring Dashboard</h1>
  <div id="clock">--:--:--</div>
</header>

<main>

  <!-- Server Selector -->
  <div class="servers">
    <button onclick="selectServer(0)">Web</button>
    <button onclick="selectServer(1)">Database</button>
    <button onclick="selectServer(2)">App</button>
  </div>

  <!-- Metrics -->
  <div class="metrics">
    <div class="card">
      <h3>CPU</h3>
      <p id="cpu">0%</p>
    </div>

    <div class="card">
      <h3>Memory</h3>
      <p id="mem">0%</p>
    </div>

    <div class="card">
      <h3>Disk</h3>
      <p id="disk">0%</p>
    </div>
  </div>

  <!-- Charts -->
  <canvas id="lineChart"></canvas>

</main>

</body>
</html>
